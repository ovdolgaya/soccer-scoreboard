<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табло</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Firebase Configuration (Widget version - database only) -->
    <script src="firebase-config-widget.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: transparent;
            font-family: Arial, sans-serif;
            padding: 10px;
        }

        .scoreboard {
            background: transparent;
            border-radius: 15px;
            padding: 10px;
            box-shadow: none;
            max-width: 800px;
            margin: 0;
            border: none;
        }

        .score-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .team.team1 {
            background: linear-gradient(135deg, var(--team1-color, #08399A) 0%, var(--team1-color-light, #0a4ab3) 100%);
        }

        .team.team2 {
            background: linear-gradient(135deg, var(--team2-color, #4A90E2) 0%, var(--team2-color-light, #5ea3f5) 100%);
        }

        .team.right {
            flex-direction: row-reverse;
            text-align: right;
        }

        .team-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 5px;
            background: white;
            padding: 5px;
        }

        .team-name {
            font-size: 24px;
            font-weight: bold;
            color: white;
            flex: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .score {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            min-width: 60px;
            text-align: center;
            padding: 0 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .separator {
            font-size: 36px;
            color: #999;
            margin: 0 10px;
        }

        /* Timer container — goal card matches this height */
        .timer-container {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            padding: 15px 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .timer-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 10px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            display: inline-block;
        }

        .half-indicator {
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-right: 10px;
        }

        .timer {
            display: inline-block;
            font-size: 32px;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .status-message {
            font-size: 24px;
            font-weight: bold;
            color: #08399A;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .waiting-message {
            text-align: center;
            color: white;
            font-size: 24px;
            padding: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* =============================================
           GOAL NOTIFICATION CARD
           Same width as .scoreboard (max-width 800px + 10px side padding).
           Height = 56px — mirrors .timer-container visual height
           (15px top padding + ~26px content + 15px bottom padding).
        ============================================= */

        #goalNotification {
            max-width: 800px;
            padding: 0 10px;        /* mirrors .scoreboard side padding */
            margin-top: 0;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #goalNotification.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #goalNotification.hiding {
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .goal-card {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        .goal-card-inner {
            position: relative;
            display: flex;
            width: 100%;
            min-height: 56px;           /* grows when assist line present */
            align-items: stretch;
        }

        /* Left coloured section — number or icon */
        .goal-card-number {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--goal-team-color, #08399A);
            min-width: 80px;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .goal-card-number span {
            font-size: 20px;
            font-weight: 900;
            color: white;
            line-height: 1;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .goal-card-number.own-goal  { background: #64748b; }
        .goal-card-number.opponent  { background: var(--goal-team-color, #4A90E2); }

        /* Centre info */
        .goal-card-info {
            flex: 1;
            background: rgba(255, 255, 255, 0.92);
            padding: 0 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            min-width: 0;
        }

        .goal-card-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            line-height: 1;
        }

        .goal-card-name {
            font-size: 17px;
            font-weight: 800;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .goal-card-name .first-name {
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            margin-right: 5px;
        }

        .goal-card-assist {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .own-goal-text,
        .opponent-text {
            font-size: 15px;
            color: #475569;
            font-weight: 700;
        }

        /* Right ball icon */
        .goal-card-ball {
            background: rgba(255, 255, 255, 0.92);
            padding: 0 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            border-left: 1px solid rgba(0,0,0,0.06);
        }

        /* Countdown progress bar at bottom */
        .goal-card-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progressShrink 5s linear forwards;
        }

        @keyframes progressShrink {
            from { width: 100%; }
            to   { width: 0%; }
        }

        @media (max-width: 768px) {
            .team-name { font-size: 18px; }
            .score { font-size: 36px; min-width: 50px; padding: 0 10px; }
            .team-logo { width: 40px; height: 40px; }
            .timer { font-size: 24px; }
            .half-indicator { font-size: 18px; }
            .timer-card { padding: 8px 15px; }
        }
    </style>
</head>
<body>
    <div class="scoreboard" id="scoreboard">
        <div class="waiting-message" id="waitingMessage">
            Загрузка...
        </div>
    </div>

    <!-- Lives outside #scoreboard so re-renders don't destroy the card -->
    <div id="goalNotification"></div>

    <script>
        // ========================================
        // VARIABLES
        // ========================================
        let matchId          = null;
        let timerInterval    = null;
        let currentMatchData = null;

        // Notification timers
        let notifTimeout     = null;
        let notifHideTimeout = null;

        // Player cache
        let playersCache = {};

        // Team data cache — logo + color fetched from /teams once, not from match record
        let teamsDataCache = {}; // { teamId: { logo, color, name } }

        // Home-team goals listener guard
        let goalsInitialized = false;

        // Opponent score baseline
        let lastOpponentScore = -1;

        // Fetch team data (logo + color) from /teams — cached per teamId
        // Team data cache — fetched once per teamId per session
        function fetchTeamData(teamId) {
            if (!teamId) return Promise.resolve(null);
            if (teamsDataCache[teamId]) return Promise.resolve(teamsDataCache[teamId]);
            return database.ref('teams/' + teamId).once('value').then(function(snap) {
                const t = snap.val() || {};
                teamsDataCache[teamId] = { logo: t.logo || '', color: t.color || '#08399A', name: t.name || '' };
                return teamsDataCache[teamId];
            });
        }

        // ========================================
        // INIT
        // ========================================
        const urlParams = new URLSearchParams(window.location.search);
        matchId = urlParams.get('match');

        if (!matchId) {
            document.getElementById('waitingMessage').textContent = 'Ошибка: не указан ID матча';
        } else {

            // ── 1. Fetch match once to render scoreboard + decide listener strategy ──
            database.ref('matches/' + matchId).once('value', function(snapshot) {
                const matchData = snapshot.val();
                if (!matchData) return;

                currentMatchData = matchData;
                lastOpponentScore = matchData.score2 || 0;
                updateScoreboard(matchData);

                // For ended matches — no listeners needed, data is frozen
                if (matchData.status === 'ended') return;

                // ── 2. Field-specific listeners — only small primitive fields, no logos ──
                const watchFields = ['score1', 'score2', 'status', 'time', 'currentHalf', 'startTime'];
                watchFields.forEach(function(field) {
                    database.ref('matches/' + matchId + '/' + field).on('value', function(snap) {
                        const val = snap.val();
                        if (!currentMatchData) return;
                        currentMatchData[field] = val;

                        // Detect opponent goal from score2 change
                        if (field === 'score2') {
                            const newScore = val || 0;
                            if (newScore > lastOpponentScore) {
                                showOpponentGoalCard(currentMatchData);
                            }
                            lastOpponentScore = newScore;
                        }

                        // Stop all listeners when match ends
                        if (field === 'status' && val === 'ended') {
                            watchFields.forEach(function(f) {
                                database.ref('matches/' + matchId + '/' + f).off();
                            });
                            database.ref('goals').orderByChild('matchId').equalTo(matchId).off();
                        }

                        // Re-render scoreboard on any field change
                        updateScoreboard(currentMatchData);
                    });
                });

                // ── 3. Home-team goal listener — only for active matches ──
                database.ref('goals')
                    .orderByChild('matchId')
                    .equalTo(matchId)
                    .once('value', function() {
                        goalsInitialized = true;
                    });

                database.ref('goals')
                    .orderByChild('matchId')
                    .equalTo(matchId)
                    .on('child_added', function(snapshot) {
                        if (!goalsInitialized) return;
                        const goal = snapshot.val();
                        if (goal) handleNewGoal(goal);
                    });
            });
        }

        // ========================================
        // COLOR HELPER
        // ========================================
        function lightenColor(hex, percent) {
            const num = parseInt((hex || '#08399A').replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x0000FF) + amt);
            return '#' + (0x1000000 + (R * 0x10000) + (G * 0x100) + B).toString(16).slice(1);
        }

        // ========================================
        // SCOREBOARD
        // ========================================
        function updateScoreboard(matchData) {
            if (!matchData) {
                document.getElementById('scoreboard').innerHTML =
                    '<div class="waiting-message">Загрузка...</div>';
                return;
            }

            const t1Id = matchData.team1Id || null;
            const t2Id = matchData.team2Id || null;

            Promise.all([fetchTeamData(t1Id), fetchTeamData(t2Id)]).then(function(teams) {
                const t1Logo  = (teams[0] && teams[0].logo)  || matchData.team1Logo  || '';
                const t2Logo  = (teams[1] && teams[1].logo)  || matchData.team2Logo  || '';
                const t1Color = (teams[0] && teams[0].color) || matchData.team1Color || '#08399A';
                const t2Color = (teams[1] && teams[1].color) || matchData.team2Color || '#4A90E2';

                const team1ColorLight = lightenColor(t1Color, 10);
                const team2ColorLight = lightenColor(t2Color, 10);

                document.documentElement.style.setProperty('--team1-color', t1Color);
                document.documentElement.style.setProperty('--team1-color-light', team1ColorLight);
                document.documentElement.style.setProperty('--team2-color', t2Color);
                document.documentElement.style.setProperty('--team2-color-light', team2ColorLight);

                const scoreboardHtml = `
                    <div class="score-container">
                        <div class="team team1">
                             ${t1Logo ? `<img src="${t1Logo}" class="team-logo" alt="Team 1">` : ''}   
                            <div class="team-name">${matchData.team1Name}</div>
                        </div>
                        <div class="score">${matchData.score1}</div>
                        <div class="separator">:</div>
                        <div class="score">${matchData.score2}</div>
                        <div class="team team2">
                            ${t2Logo ? `<img src="${t2Logo}" class="team-logo" alt="Team 2">` : ''}
                            <div class="team-name">${matchData.team2Name}</div>
                        </div>
                    </div>
                    <div class="timer-container">
                        ${getTimerContent(matchData)}
                    </div>
                `;

                document.getElementById('scoreboard').innerHTML = scoreboardHtml;

                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                if (matchData.status === 'playing') {
                    timerInterval = setInterval(function() { updateTimer(matchData); }, 100);
                }

                // Store team colors for goal card rendering
                currentMatchData = Object.assign(matchData, { _t1Color: t1Color, _t2Color: t2Color });
            });
        }

        function getTimerContent(matchData) {
            const status = getMatchStatus(matchData);

            if (status === 'scheduled') {
                const d = new Date(matchData.scheduledTime);
                const day  = String(d.getDate()).padStart(2, '0');
                const mon  = String(d.getMonth() + 1).padStart(2, '0');
                const hrs  = String(d.getHours()).padStart(2, '0');
                const mins = String(d.getMinutes()).padStart(2, '0');
                return `<div class="status-message">Матч начнется ${day}.${mon} в ${hrs}:${mins}</div>`;
            }
            if (status === 'waiting')     return '<div class="status-message">Ожидание начала матча</div>';
            if (status === 'ended')       return '<div class="status-message">МАТЧ ОКОНЧЕН</div>';
            if (status === 'half1_ended') return '<div class="status-message">1 ТАЙМ ОКОНЧЕН</div>';
            if (status === 'half2_ended') return '<div class="status-message">2 ТАЙМ ОКОНЧЕН</div>';
            if (status === 'playing') {
                const halfText = matchData.currentHalf === 1 ? '1 ТАЙМ' : '2 ТАЙМ';
                // Compute initial display from startTime directly (avoids stale matchData.time)
                const initElapsed = Math.max(0, Date.now() - matchData.startTime);
                const initSec = Math.floor(initElapsed / 1000);
                const ih = String(Math.floor(initSec / 3600)).padStart(2, '0');
                const im = String(Math.floor((initSec % 3600) / 60)).padStart(2, '0');
                const is = String(initSec % 60).padStart(2, '0');
                const initTime = ih + ':' + im + ':' + is;
                return `
                    <span class="half-indicator">${halfText}:</span>
                    <span class="timer" id="timerDisplay">${initTime}</span>
                `;
            }
            return '<div class="timer">00:00:00</div>';
        }

        function getMatchStatus(matchData) {
            if (matchData.scheduledTime && matchData.scheduledTime > Date.now()) return 'scheduled';
            return matchData.status || 'waiting';
        }

        function updateTimer(matchData) {
            if (matchData.status !== 'playing') return;
            const elapsed  = Math.max(0, Date.now() - matchData.startTime);
            const totalSec = Math.floor(elapsed / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            const timeString =
                String(h).padStart(2, '0') + ':' +
                String(m).padStart(2, '0') + ':' +
                String(s).padStart(2, '0');
            const el = document.getElementById('timerDisplay');
            if (el) el.textContent = timeString;
        }

        // ========================================
        // GOAL HANDLERS
        // ========================================

        function handleNewGoal(goal) {
            if (goal.isOwnGoal) {
                showOwnGoalCard();
                return;
            }

            // Collect all playerIds we need: scorer + assistants
            const needed = [];
            if (goal.playerId && !playersCache[goal.playerId]) needed.push(goal.playerId);
            if (goal.assists && Array.isArray(goal.assists)) {
                goal.assists.forEach(function(a) {
                    if (a.playerId && !playersCache[a.playerId]) needed.push(a.playerId);
                });
            }

            const fetches = needed.map(function(pid) {
                return database.ref('players/' + pid).once('value').then(function(snap) {
                    if (snap.val()) playersCache[pid] = snap.val();
                });
            });

            Promise.all(fetches).then(function() {
                if (goal.playerId) {
                    showPlayerGoalCard(goal, playersCache[goal.playerId] || null);
                } else {
                    showPlayerGoalCard(goal, null);
                }
            });
        }

        function showPlayerGoalCard(goal, player) {
            const teamColor = currentMatchData ? (currentMatchData._t1Color || currentMatchData.team1Color || '#08399A') : '#08399A';
            let numberHtml, nameHtml;
            if (player) {
                const num = player.number || goal.playerNumber || '?';
                const fn  = player.firstName || '';
                const ln  = (player.lastName  || '').toUpperCase();
                numberHtml = `<span>#${num}</span>`;
                nameHtml   = `${fn ? `<span class="first-name">${fn}</span>` : ''}${ln}`;
            } else {
                numberHtml = `<span>#${goal.playerNumber || '?'}</span>`;
                nameHtml   = 'НЕИЗВЕСТНЫЙ';
            }

            // Build assist line: "👟 #7 ИВАНОВ · #11 ПЕТРОВ"
            let assistLine = '';
            if (goal.assists && Array.isArray(goal.assists) && goal.assists.length > 0) {
                const parts = goal.assists.map(function(a) {
                    const ap = a.playerId ? playersCache[a.playerId] : null;
                    const num = ap ? ap.number : (a.playerNumber || '?');
                    const ln  = ap ? (ap.lastName || '').toUpperCase() : '';
                    return '#' + num + (ln ? ' ' + ln : '');
                });
                assistLine = '👟 ' + parts.join(' · ');
            }

            renderNotification(
                buildCardHtml({ teamColor, numberClass: '', numberContent: numberHtml,
                                 label: 'Гол!', nameContent: nameHtml, assistLine }),
                teamColor
            );
        }

        // Called when score2 increases (detected in the match listener)
        function showOpponentGoalCard(matchData) {
            const teamColor = matchData._t2Color || matchData.team2Color || '#4A90E2';
            const teamName  = matchData.team2Name  || 'Соперник';
            renderNotification(
                buildCardHtml({ teamColor, numberClass: 'opponent',
                                 numberContent: '<span>⚽</span>',
                                 label: 'Гол!',
                                 nameContent: `<span class="opponent-text">${teamName}</span>` }),
                teamColor
            );
        }

        function showOwnGoalCard() {
            renderNotification(
                buildCardHtml({ teamColor: '#64748b', numberClass: 'own-goal',
                                 numberContent: '<span>⚽</span>',
                                 label: 'Автогол',
                                 nameContent: '<span class="own-goal-text">Автогол</span>' }),
                '#64748b'
            );
        }

        // ========================================
        // CARD HTML BUILDER
        // ========================================
        function buildCardHtml({ teamColor, numberClass, numberContent, label, nameContent, assistLine }) {
            const hasAssist = assistLine && assistLine.length > 0;
            const cardHeight = hasAssist ? '76px' : '56px';
            const assistHtml = hasAssist
                ? `<div class="goal-card-assist">${assistLine}</div>`
                : '';
            return `
                <div class="goal-card">
                    <div class="goal-card-inner" style="height:${cardHeight}">
                        <div class="goal-card-number ${numberClass}" style="--goal-team-color:${teamColor}">
                            ${numberContent}
                        </div>
                        <div class="goal-card-info">
                            <div class="goal-card-label" style="color:${teamColor}">${label}</div>
                            <div class="goal-card-name">${nameContent}</div>
                            ${assistHtml}
                        </div>
                        <div class="goal-card-ball">⚽</div>
                        <div class="goal-card-progress" style="background:${teamColor}"></div>
                    </div>
                </div>
            `;
        }

        // ========================================
        // RENDER + ANIMATE
        // ========================================
        function renderNotification(cardHtml, teamColor) {
            const el = document.getElementById('goalNotification');

            // Cancel any in-progress hide
            if (notifTimeout)     { clearTimeout(notifTimeout);     notifTimeout     = null; }
            if (notifHideTimeout) { clearTimeout(notifHideTimeout); notifHideTimeout = null; }

            el.style.setProperty('--goal-team-color', teamColor);

            // Instantly reset to hidden (no transition), inject new content
            el.classList.remove('visible', 'hiding');
            el.style.transition = 'none';
            el.innerHTML = cardHtml;

            // Force reflow so browser registers the hidden state
            void el.offsetHeight;

            // Now animate in
            el.style.transition = '';
            el.classList.add('visible');

            // After 5s, fade out
            notifTimeout = setTimeout(function() {
                el.classList.remove('visible');
                el.classList.add('hiding');
                notifHideTimeout = setTimeout(function() {
                    el.classList.remove('hiding');
                    el.innerHTML = '';
                }, 600);
            }, 5000);
        }
    </script>
</body>
</html>
