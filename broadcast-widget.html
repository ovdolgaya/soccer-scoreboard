<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Broadcast Widget</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config-widget.js"></script>
    <script src="roster-thumbnail-helper.js"></script>
    <link rel="stylesheet" href="broadcast-widget.css">
</head>
<body>

<div id="bw-loading"><div class="bw-loading-text">Загрузка...</div></div>

<div id="bw-stage">

    <!-- LAYER 1: Full-screen canvas / image display -->
    <div id="bw-canvas-layer" class="bw-layer">
        <canvas id="bw-canvas" width="1920" height="1080"></canvas>
    </div>

    <!-- LAYER 2: Stats overlay -->
    <div id="bw-stats-layer" class="bw-layer">
        <div class="bw-stats-box" id="bw-stats-box">
            <!-- rendered by JS -->
        </div>
    </div>

    <!-- LAYER 3: Score widget (position-switching) -->
    <div id="bw-score-layer" class="bw-pos-topleft" style="opacity:0; position:absolute; transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34,1.3,0.64,1), top 0.6s ease, left 0.6s ease, bottom 0.6s ease;">
        <div class="bw-scoreboard" id="bw-scoreboard">
            <!-- rendered by JS -->
        </div>
    </div>

    <!-- Transition flash overlay -->
    <div id="bw-transition-overlay"></div>

    <!-- LAYER 5: YouTube subscribe reminder -->
    <div id="bw-subscribe-layer"></div>

</div>

<!-- LAYER 4: Goal notification (fixed, survives re-renders) -->
<div id="bw-goal-notif"></div>

<script>
// ════════════════════════════════════════════════════════════════
//  BROADCAST WIDGET — BOOT / STATE
// ════════════════════════════════════════════════════════════════

const BW_MATCH_ID = new URLSearchParams(window.location.search).get('match');

// ── DOM refs ──
const bwStage          = document.getElementById('bw-stage');
const bwCanvasLayer    = document.getElementById('bw-canvas-layer');
const bwStatsLayer     = document.getElementById('bw-stats-layer');
const bwScoreLayer     = document.getElementById('bw-score-layer');
const bwScoreboard     = document.getElementById('bw-scoreboard');
const bwCanvas         = document.getElementById('bw-canvas');
const bwCtx            = bwCanvas.getContext('2d');
const bwGoalNotif      = document.getElementById('bw-goal-notif');
const bwStatsBox       = document.getElementById('bw-stats-box');
const bwTransOverlay   = document.getElementById('bw-transition-overlay');
const bwLoading        = document.getElementById('bw-loading');
const bwSubscribeLayer = document.getElementById('bw-subscribe-layer');

// ── State ──
let bwMatchData        = null;
let bwLastStatus       = null;
let bwTimerInterval    = null;
let bwCurrentHalf      = null;

// Notification state
let bwNotifTimeout     = null;
let bwNotifHideTimeout = null;
let bwNotifVisible     = false;

// Goals
let bwGoalsInitialized = false;
let bwLastOppScore     = -1;
let bwPlayersCache     = {};

// Team data
let bwTeamsCache       = {};

// Cached rendered image data-URLs
let bwMatchThumbURL    = null;
let bwRosterThumbURL   = null;

// Sequence flags
let bwIntroShown       = false;

// ── Utilities ──
function bwFetchTeamData(teamId) {
    if (!teamId) return Promise.resolve(null);
    if (bwTeamsCache[teamId]) return Promise.resolve(bwTeamsCache[teamId]);
    return database.ref('teams/' + teamId).once('value').then(function(snap) {
        const t = snap.val() || {};
        bwTeamsCache[teamId] = { logo: t.logo || '', color: t.color || '#08399A', name: t.name || '' };
        return bwTeamsCache[teamId];
    });
}

function bwSetCssColor(color) {
    document.documentElement.style.setProperty('--bw-team-color', color || '#08399A');
}

function bwLightenColor(hex, pct) {
    const num = parseInt((hex || '#08399A').replace('#',''), 16);
    const amt = Math.round(2.55 * pct);
    const R = Math.min(255, (num >> 16) + amt);
    const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
    const B = Math.min(255, (num & 0x0000FF) + amt);
    return '#' + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
}

function bwDelay(ms) { return new Promise(r => setTimeout(r, ms)); }

function bwFlashTransition(durationMs, midFn) {
    const half = durationMs / 2;
    bwTransOverlay.classList.add('bw-flash');
    return bwDelay(half).then(function() {
        if (midFn) midFn();
        bwTransOverlay.classList.remove('bw-flash');
        return bwDelay(half);
    });
}
</script>

<!-- Helper modules (depend on state vars above) -->
<script src="broadcast-widget-canvas.js"></script>
<script src="broadcast-widget-scoreboard.js"></script>
<script src="broadcast-widget-sequences.js"></script>

<script>
// ════════════════════════════════════════════════════════════════
//  MAIN FIREBASE LISTENER
// ════════════════════════════════════════════════════════════════

if (!BW_MATCH_ID) {
    bwLoading.querySelector('.bw-loading-text').textContent = 'Ошибка: не указан ?match=ID';
} else {
    // One-time initial fetch → boot sequence
    database.ref('matches/' + BW_MATCH_ID).once('value', async function(snap) {
        const matchData = snap.val();
        if (!matchData) {
            bwLoading.querySelector('.bw-loading-text').textContent = 'Матч не найден';
            return;
        }

        bwMatchData = matchData;
        bwCurrentHalf = matchData.currentHalf || null;
        bwLastOppScore = matchData.score2 || 0;

        // Pre-fetch team data into cache
        await Promise.all([
            bwFetchTeamData(matchData.team1Id),
            bwFetchTeamData(matchData.team2Id)
        ]);

        // Cache team visuals on matchData immediately — ensures goal cards have color+logo
        // even if bwRenderScoreboard promise hasn't resolved yet
        const t1 = bwTeamsCache[matchData.team1Id] || {};
        const t2 = bwTeamsCache[matchData.team2Id] || {};
        matchData._t1Logo  = t1.logo  || '';
        matchData._t2Logo  = t2.logo  || '';
        matchData._t1Color = t1.color || '#08399A';
        matchData._t2Color = t2.color || '#4A90E2';
        bwSetCssColor(t1.color || '#08399A');

        // Render scoreboard
        bwRenderScoreboard(matchData);

        // Hide loading screen
        bwLoading.classList.add('bw-hidden');
        setTimeout(() => bwLoading.style.display = 'none', 600);

        // Run intro sequence (skips if match already in progress)
        await bwIntroSequence(matchData);

        // Handle current status on page load
        const s = matchData.status;
        if (s === 'playing') {
            bwCurrentHalf = matchData.currentHalf;
            bwScoreToTopLeft();
            bwShowScore();
            bwStartTimer(matchData);
        }
        // For half1_ended / half2_ended / ended: canvas already shown by intro skip,
        // nothing extra needed — the Firebase listener will handle future changes.

        bwLastStatus = s;

        // Start goals listener
        bwInitGoalsListener();

        // Watch for status changes
        database.ref('matches/' + BW_MATCH_ID).on('value', function(snap2) {
            const updated = snap2.val();
            if (!updated) return;

            const prevScore2 = bwMatchData ? (bwMatchData.score2 || 0) : 0;
            bwMatchData = updated;

            // Opponent goal detection
            if ((updated.score2 || 0) > prevScore2 && bwGoalsInitialized) {
                bwHandleOppGoal();
            }

            // Update scoreboard
            bwRenderScoreboard(updated);

            // Delegate status handling — bwOnStatusChange deduplicates internally
            bwOnStatusChange(updated.status, updated);
        });

    });
}
</script>
</body>
</html>
